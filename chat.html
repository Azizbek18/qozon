<!DOCTYPE html>
<html lang="uz">
<head>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="auth_guard.js"></script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qozon Premium Chat</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.1/css/all.min.css">
    <link rel="stylesheet" href="./chef-nav.css">
    <link rel="stylesheet" href="chat.css">
    <link rel="stylesheet" href="./qozon-light-theme.css">
</head>
<body>

    <div class="premium-app">
        
        <aside class="sidebar">
            <div class="sidebar-brand">
                <a href="index.html" class="logo-text" style="text-decoration: none;">qozon<span>.com</span></a>
                <a href="profil.html" class="user-profile-mini" title="Profil"><i class="fa-solid fa-user"></i></a>
            </div>

            <nav class="sidebar-menu chat-dashboard-nav" aria-label="Oshpaz paneli">
                <a href="xurmoOpa 2.html" class="menu-item" data-page="bosh-sahifa">
                    <span class="menu-icon"><img src="images/nav-home.svg" alt=""></span>
                    <span class="menu-text">Panel</span>
                </a>
                <a href="chefDashboard.html" class="menu-item" data-page="buyurtmalar">
                    <span class="menu-icon"><img src="images/nav-orders.svg" alt=""></span>
                    <span class="menu-text">Buyurtmalar</span>
                </a>
                <a href="menu.html" class="menu-item" data-page="taom-qoshish">
                    <span class="menu-icon"><img src="images/nav-add.svg" alt=""></span>
                    <span class="menu-text">Taom</span>
                </a>
                <a href="chat.html" class="menu-item active" data-page="chat">
                    <span class="menu-icon"><img src="images/nav-chat.svg" alt=""></span>
                    <span class="menu-text">Chat</span>
                </a>
            </nav>

            <div class="search-wrapper">
                <i class="fa-solid fa-magnifying-glass search-ico"></i>
                <input type="text" placeholder="Suhbatlarni qidirish...">
            </div>

            <div class="conversation-list">
                <div class="convo-list-placeholder">Yuklanmoqda...</div>
            </div>
        </aside>

        <main class="chat-viewport">
            
            <header class="chat-viewport-header" id="dynamicHeader">
                </header>

            <div class="messages-scroll-area" id="messagesBox">
                </div>

            <div class="smart-suggestions" id="suggestionsPanel">
                </div>

            <footer class="input-container-footer">
                <div class="input-pill-wrapper" style="position: relative;">
                    <input type="file" id="mediaUpload" hidden onchange="mediaUploadHandler(event)">
                    <button class="icon-control-btn" onclick="document.getElementById('mediaUpload').click()" title="Fayl biriktirish">
                        <i class="fa-solid fa-paperclip"></i>
                    </button>

                    <input type="text" id="chatInputField" placeholder="Xabar yozing..." onkeypress="handleInputKey(event)">

                    <div class="custom-emoji-picker" id="customEmojiPicker">
                        <span onclick="insertEmoji('😊')">😊</span>
                        <span onclick="insertEmoji('😂')">😂</span>
                        <span onclick="insertEmoji('🔥')">🔥</span>
                        <span onclick="insertEmoji('👍')">👍</span>
                        <span onclick="insertEmoji('🇺🇿')">🇺🇿</span>
                        <span onclick="insertEmoji('👏')">👏</span>
                        <span onclick="insertEmoji('😎')">😎</span>
                        <span onclick="insertEmoji('🎯')">🎯</span>
                    </div>

                    <button class="icon-control-btn" id="emojiToggleBtn" onclick="toggleEmojiPicker(event)" title="Emoji">
                        <i class="fa-regular fa-face-smile"></i>
                    </button>

                    <button class="premium-send-btn" onclick="handleMessageSubmit()" title="Yuborish">
                        <i class="fa-solid fa-paper-plane"></i>
                    </button>
                </div>
            </footer>
        </main>

    </div>

    <script src="./chef-nav.js"></script>
    <script src="chat.js"></script>
</body>
</html>
